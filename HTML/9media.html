<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media</title>
</head>
<body>

    <h2>Audio</h2>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <hr>

    <h2>Video</h2>
    <video width="300" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

    <hr>

    <h2>Iframe</h2>
    <iframe src="https://example.com" width="300" height="200"></iframe>

</body>
</html>
