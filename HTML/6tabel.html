<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tables</title>
</head>
<body>

    <h2>Basic Table</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Suraj</td>
                <td>23</td>
            </tr>
            <tr>
                <td>Ram</td>
                <td>25</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td>Total</td>
                <td>2</td>
            </tr>
        </tfoot>
    </table>

    <hr>

    <h2>Colspan & Rowspan</h2>

    <table border="1">
        <tr>
            <th>Name</th>
            <th colspan="2">Details</th>
        </tr>
        <tr>
            <td rowspan="2">Suraj</td>
            <td>Age</td>
            <td>23</td>
        </tr>
        <tr>
            <td>City</td>
            <td>Delhi</td>
        </tr>
    </table>

</body>
</html>
