<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lists</title>
</head>
<body>

    <h2>Ordered List</h2>
    <ol type="A" start="3">
        <li>Item 1</li>
        <li>Item 2</li>
    </ol>

    <hr>

    <h2>Unordered List</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
    </ul>

    <hr>

    <h2>Description List</h2>
    <dl>
        <dt>HTML</dt>
        <dd>Markup Language</dd>
    </dl>

</body>
</html>
