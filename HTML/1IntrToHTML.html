<!DOCTYPE html>
<!-- Declares the document as HTML5.
     Ensures the browser renders the page in standards mode (avoids quirks mode). -->


<html lang="en" dir="ltr">
<!-- Root element of the HTML document.
     lang="en" → Specifies the primary language (important for SEO and screen readers).
     dir="ltr" → Text direction is left-to-right (used for languages like English). -->


<head>
<!-- Contains metadata (not visible on the webpage).
     Used by browsers, search engines, and social media platforms. -->

    <meta charset="UTF-8">
    <!-- Defines character encoding.
         UTF-8 supports almost all characters, symbols, and emojis. -->


    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes the website responsive on different devices.
         width=device-width → Matches screen width of the device.
         initial-scale=1.0 → Sets default zoom level (100%, no zoom). -->


    <meta name="description" content="A complete HTML reference page using every HTML tag and concept." />
    <!-- Short description of the page.
         Displayed in search engine results → Important for SEO. -->


    <meta name="keywords" content="HTML, tags, reference, complete, all elements" />
    <!-- Deprecated: Modern search engines (like Google) mostly ignore this. -->


    <meta name="author" content="HTML Master" />
    <!-- Specifies the author of the webpage. -->


    <meta name="robots" content="index, follow" />
    <!-- Controls search engine behavior:
         index → allow page to be indexed
         follow → allow links to be followed -->


    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Legacy tag for Internet Explorer.
         Forces IE to use the latest rendering engine (mostly obsolete today). -->


    <meta property="og:title" content="Complete HTML Reference" />
    <meta property="og:type" content="website" />
    <!-- Open Graph tags (used by social media platforms like Facebook, LinkedIn).
         Control how the page appears when shared (title, type, preview, etc.). -->


    <base href="https://example.com/" target="_blank" />
    <!-- Sets a base URL for all relative links in the document.
         Example: <a href="page.html"> → https://example.com/page.html
         target="_blank" → All links open in a new tab by default.
         ⚠ Only one <base> tag is allowed and misuse can break navigation. -->


    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <!-- Favicon: small icon displayed in the browser tab. -->


    <link rel="canonical" href="https://example.com/html-reference" />
    <!-- Canonical URL: tells search engines the "original" version of the page.
         Helps prevent duplicate content issues (SEO). -->


    <link rel="stylesheet" href="style.css" />
    <!-- Links an external CSS file for styling the webpage. -->


    <title>Complete HTML Reference</title>
    <!-- Title of the webpage.
         Appears in browser tab and search engine results (very important for SEO). -->


    <noscript>
        <meta http-equiv="refresh" content="0; url=nojs.html" />
    </noscript>
    <!-- Fallback for users with JavaScript disabled.
         Redirects them instantly (0 seconds) to 'nojs.html'. -->


</head>

<body>
<!-- Contains all visible content of the webpage (text, images, forms, etc.). -->

</body>
</html>
