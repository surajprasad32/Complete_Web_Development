<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forms</title>
</head>
<body>

    <h2>Form Example</h2>

    <form>
        <label>Name:</label>
        <input type="text" required><br><br>

        <label>Email:</label>
        <input type="email" required><br><br>

        <label>Password:</label>
        <input type="password"><br><br>

        <label>Gender:</label>
        <input type="radio" name="g"> Male
        <input type="radio" name="g"> Female<br><br>

        <label>Skills:</label>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS<br><br>

        <label>Country:</label>
        <select>
            <option>India</option>
            <option>Nepal</option>
        </select><br><br>

        <textarea placeholder="Enter message"></textarea><br><br>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
