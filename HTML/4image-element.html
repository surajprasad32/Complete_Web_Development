<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Element</title>
</head>
<body>

    <h2>Image Element Examples</h2>

    <!-- Basic Image -->
    <img src="image.jpg" alt="Sample Image">

    <br><hr>

    <!-- With Width & Height -->
    <img src="image.jpg" alt="Sized Image" width="200" height="150">

    <br><hr>

    <!-- Lazy Loading -->
    <img src="image.jpg" alt="Lazy Image" loading="lazy">

    <br><hr>

    <!-- Image as Link -->
    <a href="https://google.com">
        <img src="image.jpg" alt="Clickable Image" width="150">
    </a>

</body>
</html>
